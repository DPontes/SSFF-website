<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tack! – SSFF</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .tack-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(160deg, #f0f7f3 0%, #fdf6f0 100%);
    }
    .tack-page h1 { margin-bottom: 1rem; }
    .tack-page p  { color: var(--clr-muted); margin-bottom: 1.5rem; }
    .countdown {
      font-size: .85rem;
      color: var(--clr-muted);
      margin-bottom: 1.5rem;
    }
    .countdown strong { color: var(--clr-primary); }
  </style>
</head>
<body>
  <div class="tack-page">
    <div>
      <span class="section-label">Meddelande skickat</span>
      <h1>Tack för ditt meddelande!</h1>
      <p>Vi återkommer till dig så snart vi kan.</p>
      <p class="countdown">Skickas tillbaka om <strong id="count">5</strong> sekunder…</p>
      <a href="index.html" class="btn">Tillbaka till startsidan</a>
    </div>
  </div>
  <script>
    let seconds = 5;
    const countEl = document.getElementById('count');
    const timer = setInterval(() => {
      seconds--;
      countEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
